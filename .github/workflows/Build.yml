
name: Build InSightecServiceHub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run build BAT
        shell: cmd
        run: Build_Hub_EXE_PyInstaller.bat

      - name: Verify output
        shell: cmd
        run: |
          dir dist
          dir dist\InSightecServiceHub

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InSightecServiceHub
          path: dist/InSightecServiceHub
